<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PhoneLight PRO Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0b0e14; --card: #161b22; --border: #30363d;
            --neon-blue: #58a6ff; --neon-green: #238636; --neon-red: #da3633;
        }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .dashboard-header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Layout de la imagen generada */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr 1.5fr;
            grid-template-rows: auto auto;
            gap: 15px;
        }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 15px; position: relative; }
        .card h3 { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; margin-top: 0; }
        
        .big-value { font-size: 3.5rem; font-weight: bold; color: var(--neon-green); margin: 10px 0; }
        
        /* Monitor de Color */
        #color-stream { width: 100%; height: 100px; border-radius: 4px; border: 1px solid #30363d; margin-top: 10px; }
        
        /* Status Indicators */
        .status-badge { padding: 5px 10px; border-radius: 4px; font-weight: bold; display: inline-block; }
        .online { background: rgba(35, 134, 54, 0.2); color: #3fb950; border: 1px solid var(--neon-green); }
        .offline { background: rgba(218, 54, 51, 0.2); color: #f85149; border: 1px solid var(--neon-red); }

        /* Historial de Logs */
        #log-container { height: 120px; overflow-y: auto; font-family: monospace; font-size: 0.75rem; text-align: left; background: #010409; padding: 10px; border-radius: 4px; }
        .log-entry { border-bottom: 1px solid #21262d; padding: 2px 0; }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <h1>PANEL DE CONTROL TÉCNICO</h1>
        <div id="global-status" class="status-badge online">SISTEMA OPERATIVO</div>
    </div>

    <div class="main-grid">
        <div class="card">
            <h3>👥 Usuarios Conectados</h3>
            <div id="user-count" class="big-value">0</div>
            <div style="color:var(--neon-blue)">↑ Carga estable</div>
        </div>

        <div class="card">
            <h3>⏱ Latencia de Red</h3>
            <div style="height:100px; display:flex; align-items:center; justify-content:center;">
                <div style="text-align:center">
                    <div id="latency-val" style="font-size:2rem">85ms</div>
                    <div class="status-badge online">ÓPTIMO</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>🎨 Color Enviado Real</h3>
            <div id="color-stream"></div>
            <p id="rgb-label" style="margin-top:10px; font-family:monospace;">RGB: 0, 0, 0</p>
        </div>

        <div class="card">
            <h3>🚀 Estado del Bridge</h3>
            <div id="bridge-tag" class="status-badge offline">DESCONECTADO</div>
            <p style="font-size:0.8rem; margin-top:10px;">Red: Art-Net (Port 6454)</p>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h3>📋 Historial de Eventos</h3>
            <div id="log-container"></div>
        </div>
    </div>

    <script>
        const socket = io();
        const logs = document.getElementById('log-container');

        socket.on('stats-update', (data) => {
            if(data.users !== undefined) document.getElementById('user-count').innerText = data.users.toLocaleString();
            
            if(data.bridgeStatus !== undefined) {
                const tag = document.getElementById('bridge-tag');
                tag.innerText = data.bridgeStatus ? "CONECTADO" : "FALLO";
                tag.className = `status-badge ${data.bridgeStatus ? 'online' : 'offline'}`;
            }

            if(data.color) {
                document.getElementById('color-stream').style.backgroundColor = `rgb(${data.color.r},${data.color.g},${data.color.b})`;
                document.getElementById('rgb-label').innerText = `RGB: ${data.color.r}, ${data.color.g}, ${data.color.b}`;
            }

            if(data.log) {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerText = `[${new Date().toLocaleTimeString()}] ${data.log}`;
                logs.prepend(entry);
            }
        });
    </script>
</body>
</html>
