<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control Pro - Phonelight</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #0a0a0a; color: #f0f0f0; margin: 0; padding: 20px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        
        .card { background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; padding: 20px; position: relative; overflow: hidden; }
        .card h2 { margin: 0; font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .card .value { font-size: 2.2rem; font-weight: 700; margin-top: 10px; display: block; }
        
        /* Monitor de Mapa */
        .map-card { grid-column: span 2; display: flex; flex-direction: column; align-items: center; }
        #map-monitor { 
            width: 100%; max-width: 500px; aspect-ratio: 1277 / 735;
            background: url('estadio.png') no-repeat center; background-size: cover;
            border-radius: 8px; position: relative; border: 1px solid #333; margin-top: 15px;
        }
        svg { position: absolute; top:0; left:0; width:100%; height:100%; }
        .sector { fill: rgba(255,255,255,0.05); stroke: rgba(255,255,255,0.2); transition: all 0.2s; }

        /* Gráfica y Logs */
        .chart-container { height: 100px; margin-top: 10px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .online { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .offline { background: #ff4444; box-shadow: 0 0 10px #ff4444; }
        
        .log-box { grid-column: 1 / -1; background: #000; border: 1px solid #2a2a2a; border-radius: 8px; padding: 15px; font-family: 'Fira Code', monospace; font-size: 0.85rem; height: 150px; overflow-y: auto; color: #00ff88; }
    </style>
</head>
<body>

    <div class="admin-grid">
        <div class="card">
            <h2>📱 Usuarios Online</h2>
            <span id="user-count" class="value">0</span>
            <div class="chart-container"><canvas id="userChart"></canvas></div>
        </div>

        <div class="card">
            <h2>📡 Latencia de Red</h2>
            <span id="ping-value" class="value">-- ms</span>
            <p id="delay-text" style="font-size: 0.8rem; color: #888;">Retraso: 0.02s</p>
        </div>

        <div class="card">
            <h2>⚙️ Estado del Puente</h2>
            <span id="bridge-status-text" class="value" style="font-size: 1.5rem;">
                <span id="bridge-dot" class="status-dot offline"></span>DESCONECTADO
            </span>
        </div>

        <div class="card">
            <h2>☁️ Estado Railway</h2>
            <span class="value" style="font-size: 1.5rem;">
                <span class="status-dot online"></span>OPERACIONAL
            </span>
        </div>

        <div class="card map-card">
            <h2>🏟️ Monitor Tiempo Real (Zonas)</h2>
            <div id="map-monitor">
                <svg viewBox="0 0 1277 735" xmlns="http://www.w3.org/2000/svg">
                    <path id="A1" class="sector" d="m666.2 240.8l114.7 57.6-102 52.2-115.8-57.6z"/>
                    <path id="A2" class="sector" d="m692.6 357.2l102.4-50.9 116 56.4-102.7 52.1z"/>
                    <path id="B1" class="sector" d="m458.5 345.3l97.5-49.1 54.8 26.8-97.7 50.7z"/>
                    <path id="B2" class="sector" d="m521 376.2l98.7-49.4 54.4 28.4-98.5 49.6z"/>
                    <path id="B3" class="sector" d="m586.9 409.8l98.3-49.8 54.8 28.2-98.5 49.6z"/>
                    <path id="B4" class="sector" d="m648.7 440.8l97.3-49.9 54.4 27.4-96.9 49.9z"/>
                </svg>
            </div>
        </div>

        <div id="log" class="log-box"></div>
    </div>

    <script>
        const socket = io();
        const logBox = document.getElementById('log');
        const userCountEl = document.getElementById('user-count');
        
        // Configuración Gráfica
        const ctx = document.getElementById('userChart').getContext('2d');
        const userChart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(20).fill(''), datasets: [{ data: Array(20).fill(0), borderColor: '#00ff88', borderWidth: 2, fill: true, backgroundColor: 'rgba(0,255,136,0.1)', tension: 0.4 }] },
            options: { plugins: { legend: {display: false} }, scales: { x: {display: false}, y: {display: false} }, elements: { point: {radius: 0} } }
        });

        // Medición de Latencia
        setInterval(() => {
            const start = Date.now();
            socket.emit('ping');
            socket.once('pong', () => {
                const ms = Date.now() - start;
                document.getElementById('ping-value').innerText = `${ms} ms`;
                document.getElementById('delay-text').innerText = `Retraso: ${(ms/1000).toFixed(3)}s`;
            });
        }, 2000);

        socket.on('stats-update', (data) => {
            if (data.users !== undefined) {
                userCountEl.innerText = data.users;
                userChart.data.datasets[0].data.push(data.users);
                userChart.data.datasets[0].data.shift();
                userChart.update();
            }

            if (data.bridgeStatus !== undefined) {
                const dot = document.getElementById('bridge-dot');
                const text = document.getElementById('bridge-status-text');
                dot.className = `status-dot ${data.bridgeStatus ? 'online' : 'offline'}`;
                text.innerHTML = `<span class="status-dot ${data.bridgeStatus ? 'online' : 'offline'}"></span>${data.bridgeStatus ? 'ACTIVO' : 'FALLO'}`;
            }

            if (data.log) {
                const entry = document.createElement('div');
                entry.innerText = `> ${data.log}`;
                logBox.prepend(entry);
            }
        });

        // Monitor de Zonas
        socket.on('color-update', (zones) => {
            Object.keys(zones).forEach(id => {
                const el = document.getElementById(id);
                if (el && zones[id].r !== undefined) {
                    el.style.fill = `rgb(${zones[id].r}, ${zones[id].g}, ${zones[id].b})`;
                    el.style.fillOpacity = "0.9";
                }
            });
        });
    </script>
</body>
</html>
