<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PhoneLight Live | Alejandro Sanz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    /* RESET */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      width: 100%;
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      background: black;
      overflow: hidden; /* Evita el scroll accidental en el estadio */
      color: white;
    }

    /* PANTALLA DE BIENVENIDA */
    #welcome {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 30px;
      background: black;
      z-index: 10;
    }

    #welcome h1 {
      font-size: 1.8rem;
      margin-bottom: 15px;
    }

    #welcome p {
      font-size: 1rem;
      line-height: 1.5;
      margin-bottom: 40px;
      opacity: 0.8;
    }

    #welcome button {
      padding: 18px 40px;
      font-size: 1.1rem;
      font-weight: bold;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      text-transform: uppercase;
    }

    /* PANTALLA DEL SHOW */
    #show {
      display: none;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    header {
      height: 60px;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      letter-spacing: 2px;
    }

    #colorArea {
      flex: 1;
      background: black;
      /* Transición suave para cambios de color profesionales */
      transition: background-color 0.15s linear;
    }

    footer {
      height: 40px;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div id="welcome">
    <h1>Bienvenido al concierto de Alejandro Sanz</h1>
    <p>Prepárate para una experiencia única.<br>Sube el brillo al máximo. Tu pantalla será parte del espectáculo.</p>
    <button onclick="enterShow()">Entrar a la experiencia</button>
  </div>

  <div id="show">
    <header>GIRA SANZ 2026</header>
    <div id="colorArea"></div>
    <footer>Proyecto PhoneLight Stadium</footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let wakeLock = null;

    // Función para evitar que el móvil apague la pantalla por inactividad
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      } catch (err) {
        console.log("WakeLock no disponible");
      }
    }

    function enterShow() {
      // 1. Cambiar interfaz
      document.getElementById("welcome").style.display = "none";
      document.getElementById("show").style.display = "flex";
      
      // 2. Intentar poner pantalla completa
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
      }

      // 3. Mantener pantalla encendida
      requestWakeLock();
    }

    // --- CORRECCIÓN DE COMUNICACIÓN ---
    // Escuchamos el evento "color" enviado por el servidor
    socket.on("color", (color) => {
      if (color && color.r !== undefined) {
        document.getElementById("colorArea").style.backgroundColor =
          `rgb(${color.r}, ${color.g}, ${color.b})`;
      }
    });

    socket.on("connect", () => {
      console.log("Conectado al sistema de luces");
    });
  </script>

</body>
</html>
