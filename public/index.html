<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PhoneLight Live</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* RESET */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      width: 100%;
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      background: black;
      overflow: hidden;
    }

    /* PANTALLA DE BIENVENIDA */
    #welcome {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      color: white;
      background: black;
    }

    #welcome h1 {
      font-size: 2rem;
      margin-bottom: 15px;
    }

    #welcome p {
      font-size: 1.1rem;
      margin-bottom: 30px;
      opacity: 0.8;
    }

    #welcome button {
      padding: 15px 30px;
      font-size: 1rem;
      font-weight: bold;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    /* PANTALLA DEL SHOW */
    #show {
      display: none;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    header {
      height: 60px;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      letter-spacing: 2px;
    }

    #colorArea {
      flex: 1;
      background: black;
      transition: background 0.2s linear;
    }

    footer {
      height: 40px;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <!-- PANTALLA DE BIENVENIDA -->
  <div id="welcome">
    <h1>Bienvenido al concierto de Alejandro Sanz</h1>
    <p>Prepárate para una experiencia única.<br>Tu pantalla será parte del espectáculo.</p>
    <button onclick="enterShow()">Entrar a la experiencia</button>
  </div>

  <!-- PANTALLA DEL SHOW -->
  <div id="show">
    <header>GIRA SANZ 2026</header>
    <div id="colorArea"></div>
    <footer>Proyecto PhoneLight Stadium</footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    function enterShow() {
      document.getElementById("welcome").style.display = "none";
      document.getElementById("show").style.display = "flex";
    }

    // Cambiar color según DMX
    socket.on("colorChange", (color) => {
      document.getElementById("colorArea").style.backgroundColor =
        `rgb(${color.r}, ${color.g}, ${color.b})`;
    });
  </script>

</body>
</html>
