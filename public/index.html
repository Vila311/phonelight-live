<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alejandro Sanz - Experiencia Estadio</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --sanz-orange: rgb(254, 109, 0);
        }

        body { 
            margin: 0; 
            background: #000; 
            color: white; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }

        /* --- PANTALLA DE SELECCIÓN --- */
        #setup-screen {
            width: 90%;
            max-width: 500px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 1.5rem; margin-bottom: 10px; color: var(--sanz-orange); }
        .welcome-text { font-size: 1rem; color: #bbb; margin-bottom: 25px; }

        #map-container { 
            width: 100%; 
            background: #111;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #333;
        }
        
        /* Estilos del Mapa SVG */
        .sector { fill: #333; stroke: #000; stroke-width: 2px; transition: all 0.4s ease; cursor: pointer; }
        
        /* Color de la gira al seleccionar */
        .sector.selected { 
            fill: var(--sanz-orange) !important; 
            stroke: #fff; 
            filter: drop-shadow(0 0 12px rgba(254, 109, 0, 0.8));
        }

        #info-area {
            margin-top: 25px;
            min-height: 100px;
            width: 100%;
        }

        #zone-confirm {
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            margin-bottom: 15px;
            display: none; /* Se activa al elegir */
        }

        .btn-next {
            background: var(--sanz-orange);
            color: white;
            border: none;
            padding: 15px 45px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            display: none; /* Se activa al elegir */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* --- PANTALLA DE COLOR (MODO SHOW) --- */
        #show-screen {
            display: none; /* Oculto hasta dar al botón */
            width: 100%;
            height: 100%;
        }

        .label-footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 3px;
            opacity: 0.4;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>Alejandro Sanz</h1>
        <p class="welcome-text">Bienvenido al concierto. Tu teléfono formará parte del show. Selecciona tu ubicación:</p>
        
        <div id="map-container">
            <svg viewBox="0 0 1277 735" xmlns="http://www.w3.org/2000/svg">
                <path id="A1" class="sector" d="m666.2 240.8l114.7 57.6-102 52.2-115.8-57.6z"/>
                <path id="A2" class="sector" d="m692.6 357.2l102.4-50.9 116 56.4-102.7 52.1z"/>
                <path id="B1" class="sector" d="m458.5 345.3l97.5-49.1 54.8 26.8-97.7 50.7z"/>
                <path id="B2" class="sector" d="m521 376.2l98.7-49.4 54.4 28.4-98.5 49.6z"/>
                <path id="B3" class="sector" d="m586.9 409.8l98.3-49.8 54.8 28.2-98.5 49.6z"/>
                <path id="B4" class="sector" d="m648.7 440.8l97.3-49.9 54.4 27.4-96.9 49.9z"/>
            </svg>
        </div>

        <div id="info-area">
            <div id="zone-confirm">ESTÁS EN LA ZONA: <span id="target-id" style="color:var(--sanz-orange)">--</span></div>
            <button id="btn-go" class="btn-next" onclick="goToExperience()">ENTRAR AL SHOW</button>
        </div>
    </div>

    <div id="show-screen">
        <div class="label-footer" id="footer-zone">CONECTADO</div>
    </div>

    <script>
        const socket = io();
        let myZone = null;

        // SELECCIÓN DE ZONA
        document.querySelectorAll('.sector').forEach(sector => {
            sector.addEventListener('click', function() {
                // 1. Limpiar otras selecciones
                document.querySelectorAll('.sector').forEach(s => s.classList.remove('selected'));
                
                // 2. Pintar la zona del color de la gira (activando la clase CSS)
                this.classList.add('selected');
                myZone = this.id;

                // 3. Mostrar confirmación y botón
                document.getElementById('target-id').innerText = myZone;
                document.getElementById('zone-confirm').style.display = 'block';
                document.getElementById('btn-go').style.display = 'inline-block';
                
                // Vibración táctil si está disponible
                if (window.navigator.vibrate) window.navigator.vibrate(30);
            });
        });

        // FUNCIÓN DEL BOTÓN "ENTRAR AL SHOW"
        function goToExperience() {
            if (!myZone) return;

            // Notificar al servidor para unirse a la sala de esa zona
            socket.emit('join-zone', myZone);

            // Transición visual: Ocultar mapa, mostrar pantalla de color
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('show-screen').style.display = 'block';
            document.getElementById('footer-zone').innerText = `ZONA ${myZone} ACTIVADA`;
            
            // Iniciar en negro total
            document.body.style.backgroundColor = "#000";
        }

        // ESCUCHAR COLORES DE LA MA3 (BRIDGE -> SERVER -> MÓVIL)
        socket.on('color-update', (allZonesData) => {
            // Buscamos si el Bridge mandó datos para MI zona específica
            if (myZone && allZonesData[myZone]) {
                const color = allZonesData[myZone];
                document.body.style.backgroundColor = `rgb(${color.r}, ${color.g}, ${color.b})`;
            }
        });
    </script>
</body>
</html>
