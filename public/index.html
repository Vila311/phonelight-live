<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PhoneLight Live | Alejandro Sanz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    /* RESET */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      width: 100%;
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      background: black;
      overflow: hidden; /* Evita que los usuarios hagan scroll */
      color: white;
    }

    /* --- PANTALLA DE BIENVENIDA --- */
    #welcome {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 30px;
      background: #000000;
      z-index: 10;
    }

    #welcome h1 {
      font-size: 1.8rem;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }

    #welcome p {
      font-size: 1rem;
      line-height: 1.5;
      margin-bottom: 40px;
      opacity: 0.8;
    }

    #welcome button {
      padding: 18px 40px;
      font-size: 1.1rem;
      font-weight: bold;
      background: #ffffff;
      color: #000000;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      text-transform: uppercase;
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
    }

    /* --- PANTALLA DEL SHOW --- */
    #show {
      display: none;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    header {
      height: 60px;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      letter-spacing: 2px;
      z-index: 2;
    }

    #colorArea {
      flex: 1;
      background: black;
      /* Transición súper rápida pero lo suficiente para suavizar saltos del fader */
      transition: background-color 0.1s linear;
    }

    footer {
      height: 40px;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      opacity: 0.7;
      z-index: 2;
    }
  </style>
</head>
<body>

  <div id="welcome">
    <h1>Bienvenido al concierto de Alejandro Sanz</h1>
    <p>Prepárate para una experiencia única.<br>Sube el brillo al máximo. Tu pantalla será parte del espectáculo.</p>
    <button onclick="enterShow()">Entrar a la experiencia</button>
  </div>

  <div id="show">
    <header>GIRA SANZ 2026</header>
    <div id="colorArea"></div>
    <footer>Proyecto PhoneLight Stadium</footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let wakeLock = null;

    // Función para evitar que la pantalla se apague sola
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
          console.log('Pantalla bloqueada para que no se apague.');
        }
      } catch (err) {
        console.log("WakeLock no soportado en este navegador.");
      }
    }

    function enterShow() {
      // 1. Ocultar bienvenida y mostrar área de color
      document.getElementById("welcome").style.display = "none";
      document.getElementById("show").style.display = "flex";
      
      // 2. Intentar poner en Pantalla Completa
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(e => console.log("Fullscreen bloqueado por el navegador"));
      }

      // 3. Solicitar mantener la pantalla encendida
      requestWakeLock();
    }

    // --- SINCRONIZACIÓN CON EL SERVIDOR ---
    // Ahora escuchamos "color" (Igual que en server.js y admin.html)
    socket.on("color", (color) => {
      // Validamos que los datos RGB existan antes de pintar
      if (color && color.r !== undefined && color.g !== undefined && color.b !== undefined) {
        document.getElementById("colorArea").style.backgroundColor = 
          `rgb(${color.r}, ${color.g}, ${color.b})`;
      }
    });

    // Mensaje de estado por si se cae el internet un momento
    socket.on("connect", () => {
      console.log("Conectado al servidor de iluminación.");
    });
  </script>

</body>
</html>
