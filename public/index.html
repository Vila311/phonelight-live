<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alejandro Sanz - Experiencia Estadio</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --sanz-orange: rgb(254, 109, 0);
            --sanz-orange-alpha: rgba(254, 109, 0, 0.7);
        }

        body { 
            margin: 0; 
            background: #000; 
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* PANTALLA DE SELECCIÓN */
        #setup-screen {
            width: 95%;
            max-width: 600px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease-out;
        }

        h1 { font-size: 1.6rem; margin-bottom: 5px; color: var(--sanz-orange); letter-spacing: 2px; }
        .welcome-text { font-size: 0.9rem; color: #aaa; margin-bottom: 20px; padding: 0 10px; }

        /* CONTENEDOR DEL MAPA CON IMAGEN DE FONDO */
        #map-container { 
            width: 100%; 
            aspect-ratio: 1277 / 735; /* Proporción exacta de tu SVG */
            background-image: url('estadio.png'); 
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 12px;
            border: 2px solid #333;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Estilos de los sectores del SVG */
        .sector { 
            fill: rgba(255, 255, 255, 0.05); /* Casi invisible para ver el fondo */
            stroke: rgba(255, 255, 255, 0.2); 
            stroke-width: 1.5px; 
            transition: all 0.3s ease; 
            cursor: pointer; 
        }

        /* Al seleccionar: Naranja corporativo con transparencia para no tapar el fondo del todo */
        .sector.selected { 
            fill: var(--sanz-orange-alpha) !important; 
            stroke: #fff; 
            stroke-width: 3px;
            filter: drop-shadow(0 0 15px var(--sanz-orange));
        }

        #info-area {
            margin-top: 20px;
            min-height: 110px;
            width: 100%;
        }

        #zone-confirm {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: none;
        }

        .btn-next {
            background: var(--sanz-orange);
            color: white;
            border: none;
            padding: 16px 50px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            display: none;
            box-shadow: 0 4px 20px rgba(254, 109, 0, 0.4);
        }

        /* PANTALLA DE COLOR (MODO SHOW) */
        #show-screen {
            display: none;
            width: 100%;
            height: 100%;
            transition: background 0.2s ease;
        }

        .label-footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 4px;
            opacity: 0.3;
            pointer-events: none;
            text-transform: uppercase;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>ALEJANDRO SANZ LIVE</h1>
        <p class="welcome-text">Tu móvil será parte del espectáculo.<br>Toca tu ubicación en el mapa:</p>
        
        <div id="map-container">
            <svg viewBox="0 0 1277 735" xmlns="http://www.w3.org/2000/svg">
                <path id="A1" class="sector" d="m666.2 240.8l114.7 57.6-102 52.2-115.8-57.6z"/>
                <path id="A2" class="sector" d="m692.6 357.2l102.4-50.9 116 56.4-102.7 52.1z"/>
                <path id="B1" class="sector" d="m458.5 345.3l97.5-49.1 54.8 26.8-97.7 50.7z"/>
                <path id="B2" class="sector" d="m521 376.2l98.7-49.4 54.4 28.4-98.5 49.6z"/>
                <path id="B3" class="sector" d="m586.9 409.8l98.3-49.8 54.8 28.2-98.5 49.6z"/>
                <path id="B4" class="sector" d="m648.7 440.8l97.3-49.9 54.4 27.4-96.9 49.9z"/>
            </svg>
        </div>

        <div id="info-area">
            <div id="zone-confirm">ZONA SELECCIONADA: <span id="target-id" style="color:var(--sanz-orange)">--</span></div>
            <button id="btn-go" class="btn-next" onclick="goToExperience()">CONECTAR DISPOSITIVO</button>
        </div>
    </div>

    <div id="show-screen">
        <div class="label-footer" id="footer-zone">CONECTADO</div>
    </div>

    <script>
        const socket = io();
        let myZone = null;

        // SELECCIÓN TÁCTIL
        document.querySelectorAll('.sector').forEach(sector => {
            sector.addEventListener('click', function() {
                // Limpiar selección previa
                document.querySelectorAll('.sector').forEach(s => s.classList.remove('selected'));
                
                // Activar nueva zona
                this.classList.add('selected');
                myZone = this.id;

                // Actualizar interfaz
                document.getElementById('target-id').innerText = myZone;
                document.getElementById('zone-confirm').style.display = 'block';
                document.getElementById('btn-go').style.display = 'inline-block';
                
                if (window.navigator.vibrate) window.navigator.vibrate(25);
            });
        });

        // ENTRAR AL MODO COLOR
        function goToExperience() {
            if (!myZone) return;
            socket.emit('join-zone', myZone);

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('show-screen').style.display = 'block';
            document.getElementById('footer-zone').innerText = `ZONA ${myZone} • SISTEMA ACTIVO`;
            document.body.style.backgroundColor = "#000";
        }

        // RECEPCIÓN DMX POR ZONAS
        socket.on('color-update', (allZonesData) => {
            if (myZone && allZonesData[myZone]) {
                const color = allZonesData[myZone];
                document.body.style.backgroundColor = `rgb(${color.r}, ${color.g}, ${color.b})`;
            }
        });
    </script>
</body>
</html>
