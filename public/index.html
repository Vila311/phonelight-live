<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PhoneLight Live</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      width: 100%;
      height: 100%;
    }

    #screen {
      width: 100%;
      height: 100%;
      background: black;
    }
  </style>
</head>
<body>

<div id="screen"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  const screen = document.getElementById("screen");

socket.on("colorChange", (color) => {
    document.getElementById("colorArea").style.backgroundColor =
      `rgb(${color.r},${color.g},${color.b})`;
});
</script>

</body>
</html>
